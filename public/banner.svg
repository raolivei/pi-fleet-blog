<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Eldertree — three-node cluster with circuit-tree motif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Horizon glow (room for hero text) -->
  <ellipse cx="600" cy="320" rx="520" ry="120" fill="#14b8a6" opacity="0.06"/>

  <!-- Circuit traces (subtle PCB branches) -->
  <g stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round">
    <path d="M600 340 L600 260"/>
    <path d="M600 300 L480 220"/>
    <path d="M600 300 L720 220"/>
    <path d="M480 220 L420 180"/>
    <path d="M720 220 L780 180"/>
    <path d="M600 260 L540 200"/>
    <path d="M600 260 L660 200"/>
  </g>

  <!-- Tree trunk -->
  <path d="M600 340 L600 200" stroke="url(#treeGrad)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Branches -->
  <g stroke="url(#treeGrad)" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <path d="M600 240 L500 170" stroke-width="5"/>
    <path d="M600 240 L700 170" stroke-width="5"/>
    <path d="M600 210 L600 130" stroke-width="5"/>
    <path d="M600 200 L530 150" stroke-width="3.5"/>
    <path d="M600 200 L670 150" stroke-width="3.5"/>
  </g>

  <!-- Three HA nodes (peer control plane) -->
  <g filter="url(#softGlow)">
    <circle cx="420" cy="165" r="28" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="420" cy="165" r="14" fill="url(#nodeGlow)"/>
    <text x="420" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">node-1</text>

    <circle cx="600" cy="125" r="32" fill="#0f172a" stroke="#2dd4bf" stroke-width="2.5"/>
    <circle cx="600" cy="125" r="16" fill="url(#nodeGlow)"/>
    <text x="600" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">node-2</text>

    <circle cx="780" cy="165" r="28" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="780" cy="165" r="14" fill="url(#nodeGlow)"/>
    <text x="780" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">node-3</text>
  </g>

  <!-- HA mesh (light) -->
  <g stroke="#14b8a6" stroke-width="1" opacity="0.35">
    <line x1="448" y1="165" x2="572" y2="135"/>
    <line x1="628" y1="135" x2="752" y2="165"/>
    <line x1="448" y1="165" x2="752" y2="165"/>
  </g>

  <!-- VIP hints -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#64748b">
    <text x="120" y="360">API .100</text>
    <text x="120" y="378">Ingress .200</text>
    <text x="120" y="396">DNS .201</text>
  </g>
</svg>
